<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATEC DO CAOS - TCG</title>
    <link rel="stylesheet" href="bonito.css">
</head>
<body>

<div class="mesa-container">
    <aside class="coluna-lateral">
        <div class="moldura-box" id="stacks-area">
            <div class="titulo-box">STACKS</div>
            <div id="deck-visual">BARALHO</div>
        </div>
        <div class="moldura-box guia-rapido">
            <div class="titulo-box">GUIA RÁPIDO</div>
            <p>♥ Vida Inicial: 10</p>
            <p>🕒 Turno: +1 Clock / +2 Cartas</p>
            <small><i>Sem cartas na mão: dano direto!</i></small>
        </div>
    </aside>

    <main class="coluna-central">
        <header>
            <h1>FATEC DO CAOS</h1>
            <p>- 30 CARTAS POR DECK -</p>
        </header>

        <div id="campo-inimigo" class="area-batalha"></div>
        <div id="campo-batalha" class="area-batalha"></div>

        <div class="area-inferior">
            <div id="minha-mao"></div>
            <button id="btnPassar" onclick="passarTurno()">PASSAR TURNO</button>
        </div>
    </main>

    <aside class="coluna-lateral">
        <div class="moldura-box" id="terreno-display">
            <div class="titulo-box">TERRENO</div>
            <span id="nomeTerreno">Sorteando...</span>
            <br><small id="efeitoTerreno"></small>
        </div>

        <div class="status-vertical">
            <div class="stat-card oponente">
                <span class="stat-value" id="vidaInimigo">10</span>
                <label>HP OPONENTE</label>
            </div>
            
            <div class="stat-card jogador">
                <span class="stat-value" id="minhaVida">10</span>
                <label>SEU HP</label>
            </div>

            <div class="stat-card clock">
                <span class="stat-value" id="meuClock">5</span>
                <label>CLOCK (MANA)</label>
            </div>
        </div>

        <div class="moldura-box descarte">
            <div class="titulo-box">DESCARTE</div>
        </div>
    </aside>
</div>

<script src="cartas.js"></script>
<script src="terrenos.js"></script>
<script src="interface.js"></script>
<script src="logica.js"></script>
</body>
</html>
