<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FATEC DO CAOS - TCG</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #status-container {
            display: flex;
            gap: 30px;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #444;
            margin-bottom: 20px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        /* Área do Campo (Slots) */
        #campo-batalha {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            min-height: 180px;
            width: 90%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .slot-campo {
            width: 120px;
            height: 160px;
            border: 2px dashed #555;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: #111;
        }

        .slot-campo:hover {
            border-color: #888;
            background: #222;
        }

        /* Cartas na Mão */
        #minha-mao {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .carta-mao {
            width: 100px;
            height: 140px;
            background: #3c3c3c;
            border: 2px solid #ffd700;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            padding: 5px;
            transition: transform 0.2s;
        }

        .carta-mao:hover {
            transform: translateY(-10px);
            background: #4a4a4a;
        }

        #controles {
            margin-top: 20px;
        }

        button#btnPassar {
            padding: 15px 30px;
            font-size: 18px;
            background: #8b0000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button#btnPassar:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>FATEC DO CAOS</h1>

    <div id="status-container">
        <div class="stat-box" style="color: #ff4d4d;">
            <span class="stat-value" id="vidaInimigo">10</span>
            HP OPONENTE
        </div>
        <div class="stat-box" style="color: #4dff4d;">
            <span class="stat-value" id="minhaVida">10</span>
            SEU HP
        </div>
        <div class="stat-box" style="color: #4da6ff;">
            <span class="stat-value" id="meuClock">5</span>
            CLOCK (MANA)
        </div>
    </div>

    <h3>CARTAS NO CAMPO</h3>
    <div id="campo-batalha">
        </div>

    <h3>SUA MÃO</h3>
    <div id="minha-mao">
        </div>

    <div id="controles">
        <button id="btnPassar" onclick="passarTurno()">PASSAR TURNO</button>
    </div>

    <script src="funcionamento.js"></script>
</body>
</html>
